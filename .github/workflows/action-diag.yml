name: SPRT container diagnostics

on:
  workflow_dispatch:

jobs:
  diag-container:
    runs-on: [self-hosted, linux, x64, sprt]

    container:
      image: ghcr.io/stultusverus/chess-sprt-runner:latest
      options: --cpus 1 --memory 1g

    steps:
      - name: Container identity and file-command access
        run: |
          echo "Container user:"
          id
          whoami || true
          echo
          echo "Paths:"
          echo "RUNNER_TEMP=$RUNNER_TEMP"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -ld /__w /__w/_temp /__w/_temp/_runner_file_commands || true
          echo
          echo "Write tests:"
          touch "$RUNNER_TEMP/manual-write-test"
          echo "manual write ok"