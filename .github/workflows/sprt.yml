name: SPRT

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref or commit"
        required: false
        default: "main"
        type: string
      head_ref:
        description: "Head ref or commit"
        required: false
        type: string
      test_mode:
        description: "SPRT mode"
        required: false
        default: "prove-gain"
        type: choice
        options:
          - prove-gain
          - non-regression
          - custom
      sprt:
        description: "Custom FastChess SPRT args; used only when test_mode=custom"
        required: false
        default: ""
        type: string
      rounds:
        description: "FastChess rounds"
        required: false
        default: "1500"
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: sprt-home-server
  cancel-in-progress: false

jobs:
  sprt:
    name: FastChess SPRT
    runs-on: [self-hosted, linux, x64, sprt]

    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'sprt-required')

    container:
      image: ghcr.io/stultusverus/chess-sprt-runner:latest
      options: --cpus 4 --memory 8g

    timeout-minutes: 720

    env:
      OLD_VERSION: base
      NEW_VERSION: candidate
      ROUNDS: "1000"
      GAMES: "2"
      CONCURRENCY: "3"
      TC: "10+0.1"
      SPRT: "elo0=0 elo1=10 alpha=0.10 beta=0.10"
      DRAW: "movenumber=34 movecount=8 score=20"
      RESIGN: "movecount=3 score=600"
      HASH_MB: "64"
      QUIET_CONSOLE: "1"
      STARTUP_MS: "60000"
      UCINEWGAME_MS: "60000"
      PING_MS: "60000"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust Git workspace
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve refs
        id: refs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "${GITHUB_OUTPUT}"
              echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "${GITHUB_OUTPUT}"
          else
              base_ref="${{ inputs.base_ref }}"
              head_ref="${{ inputs.head_ref }}"
              if [[ -z "${head_ref}" ]]; then
                  head_ref="$(git rev-parse HEAD)"
              fi
              git fetch origin "${base_ref}"
              echo "base_sha=$(git rev-parse FETCH_HEAD)" >> "${GITHUB_OUTPUT}"
              echo "head_sha=$(git rev-parse "${head_ref}")" >> "${GITHUB_OUTPUT}"
          fi

      - name: Resolve SPRT mode
        id: sprt_mode
        shell: bash
        run: |
          mode="prove-gain"
          custom_sprt=""
          rounds="1500"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              mode="${{ inputs.test_mode }}"
              custom_sprt="${{ inputs.sprt }}"
              rounds="${{ inputs.rounds }}"
          else
              labels='${{ join(github.event.pull_request.labels.*.name, ',') }}'
              if [[ ",${labels}," == *",sprt-non-regression,"* ]]; then
                  mode="non-regression"
              elif [[ ",${labels}," == *",sprt-prove-gain,"* ]]; then
                  mode="prove-gain"
              fi
          fi

          case "${mode}" in
              prove-gain)
                  sprt="elo0=0 elo1=10 alpha=0.10 beta=0.10"
                  ;;
              non-regression)
                  sprt="elo0=-5 elo1=0 alpha=0.05 beta=0.05"
                  ;;
              custom)
                  if [[ -z "${custom_sprt}" ]]; then
                      echo "custom mode requires non-empty sprt input" >&2
                      exit 2
                  fi
                  sprt="${custom_sprt}"
                  ;;
              *)
                  echo "unknown SPRT mode: ${mode}" >&2
                  exit 2
                  ;;
          esac

          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "sprt=${sprt}" >> "${GITHUB_OUTPUT}"
          echo "rounds=${rounds}" >> "${GITHUB_OUTPUT}"

          echo "SPRT mode: ${mode}"
          echo "SPRT args: ${sprt}"
          echo "Rounds: ${rounds}"

      - name: Prepare SPRT work directory
        shell: bash
        run: |
          rm -rf /tmp/chess-sprt
          mkdir -p /tmp/chess-sprt/books
          mkdir -p /tmp/chess-sprt/vers
          mkdir -p /tmp/chess-sprt/runs
          cp "${GITHUB_WORKSPACE}/books/8moves_v3.pgn" /tmp/chess-sprt/books/8moves_v3.pgn
          test -f /tmp/chess-sprt/books/8moves_v3.pgn
          echo "Prepared /tmp/chess-sprt"

      - name: Build base engine
        shell: bash
        run: |
          cd "${GITHUB_WORKSPACE}"
          git checkout "${{ steps.refs.outputs.base_sha }}"
          cmake -S . -B /tmp/chess-sprt/build-base -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/chess-sprt/build-base --parallel 4
          cp /tmp/chess-sprt/build-base/chess-engine /tmp/chess-sprt/vers/base
          chmod +x /tmp/chess-sprt/vers/base

      - name: Build candidate engine
        shell: bash
        run: |
          cd "${GITHUB_WORKSPACE}"
          git checkout "${{ steps.refs.outputs.head_sha }}"
          cmake -S . -B /tmp/chess-sprt/build-candidate -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/chess-sprt/build-candidate --parallel 4
          cp /tmp/chess-sprt/build-candidate/chess-engine /tmp/chess-sprt/vers/candidate
          chmod +x /tmp/chess-sprt/vers/candidate

      - name: Smoke-test engines
        shell: bash
        run: |
          printf 'uci\nisready\nquit\n' | /tmp/chess-sprt/vers/base
          printf 'uci\nisready\nquit\n' | /tmp/chess-sprt/vers/candidate

      - name: Run SPRT
        shell: bash
        env:
          BOOKS_DIR: /tmp/chess-sprt/books
          VERS_DIR: /tmp/chess-sprt/vers
          RUNS_DIR: /tmp/chess-sprt/runs
          OPENINGS: /tmp/chess-sprt/books/8moves_v3.pgn
          SPRT: ${{ steps.sprt_mode.outputs.sprt }}
          ROUNDS: ${{ steps.sprt_mode.outputs.rounds }}
          SPRT_MODE: ${{ steps.sprt_mode.outputs.mode }}
        run: |
          cd "${GITHUB_WORKSPACE}"
          ./scripts/run-fastchess-sprt.sh base candidate

      - name: Locate latest SPRT run
        id: run_dir
        if: always()
        shell: bash
        run: |
          latest="$(find /tmp/chess-sprt/runs -maxdepth 1 -type d -name '*-base-vs-candidate' | sort | tail -n 1 || true)"
          echo "path=${latest}" >> "${GITHUB_OUTPUT}"
          echo "Latest SPRT run: ${latest}"

      - name: Generate summary
        if: always() && steps.run_dir.outputs.path != ''
        shell: bash
        run: |
          cd "${GITHUB_WORKSPACE}"
          ./scripts/summarize-sprt.sh "${{ steps.run_dir.outputs.path }}"
          cat "${{ steps.run_dir.outputs.path }}/summary.md" >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload summary only
        if: always() && steps.run_dir.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: sprt-summary-${{ github.run_id }}
          path: |
            ${{ steps.run_dir.outputs.path }}/summary.md
            ${{ steps.run_dir.outputs.path }}/metadata.txt