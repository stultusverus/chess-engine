name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Release
            build_type: Release
            sanitizer_flags: ""
          - name: Debug ASan UBSan
            build_type: Debug
            sanitizer_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer"

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE="${{ matrix.config.build_type }}"
          -DCMAKE_CXX_FLAGS="${{ matrix.config.sanitizer_flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.config.sanitizer_flags }}"

      - name: Build
        run: cmake --build build --parallel 2

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Benchmark smoke test
        run: |
          BENCH_JSON="$(./build/bench_engine bench --json)"
          echo "$BENCH_JSON" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert 'positions' in data, 'missing positions'
          assert isinstance(data['positions'], list) and len(data['positions']) > 0, 'empty positions'
          assert 'total' in data, 'missing total'
          total = data['total']
          assert 'nodes' in total and total['nodes'] > 0, 'missing or zero nodes'
          assert 'signature' in total and total['signature'], 'missing signature'
          print(f'Benchmark OK: {total[\"nodes\"]} nodes, signature {total[\"signature\"]}')
          "
