name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: macos-latest
            suffix: macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          NPROC=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
          cmake --build build --parallel "$NPROC"

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Package
        run: |
          mkdir -p pkg
          cp build/chess-engine pkg/
          cp README.md pkg/
          if [ -f LICENSE ]; then cp LICENSE pkg/; fi
          echo "version=${GITHUB_REF_NAME:-unknown}" > pkg/version.txt
          echo "platform=${{ matrix.suffix }}" >> pkg/version.txt
          echo "commit=${GITHUB_SHA}" >> pkg/version.txt
          tar -czf "chess-engine-${{ matrix.suffix }}.tar.gz" -C pkg .
          checksum_file="chess-engine-${{ matrix.suffix }}.tar.gz.sha256"
          archive="chess-engine-${{ matrix.suffix }}.tar.gz"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$checksum_file"
          elif command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$archive" > "$checksum_file"
          else
            echo "no SHA256 tool available" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: chess-engine-${{ matrix.suffix }}
          path: |
            chess-engine-${{ matrix.suffix }}.tar.gz
            chess-engine-${{ matrix.suffix }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/chess-engine-linux-x86_64/chess-engine-linux-x86_64.tar.gz
            artifacts/chess-engine-linux-x86_64/chess-engine-linux-x86_64.tar.gz.sha256
            artifacts/chess-engine-macos-arm64/chess-engine-macos-arm64.tar.gz
            artifacts/chess-engine-macos-arm64/chess-engine-macos-arm64.tar.gz.sha256
          generate_release_notes: true
